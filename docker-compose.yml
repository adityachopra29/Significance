services:
  db:
    image: postgres:16-alpine
    container_name: aie_postgres
    environment:
      POSTGRES_USER: aie
      POSTGRES_PASSWORD: aie
      POSTGRES_DB: aie
    ports:
      - "5433:5432"
    volumes:
      - aie_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aie"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://aie:aie@db:5432/aie
    depends_on:
      db:
        condition: service_healthy

  worker:
    build: ./backend
    command: python -m app.run_worker
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://aie:aie@db:5432/aie
      INGEST_ON_STARTUP: "true"
    depends_on:
      db:
        condition: service_healthy

volumes:
  aie_pgdata:
